<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全国防災・運行情報アプリ</title>
    <style>
        /* ベーススタイル */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        /* 検索エリア */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box select {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            background-color: white;
        }
        .search-box button {
            padding: 12px 24px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .search-box button:hover {
            background-color: #2980b9;
        }
        
        /* 各情報カードのスタイル */
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .card h2 {
            margin-top: 0;
            font-size: 1.2rem;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }
        .loading {
            color: #7f8c8d;
            font-size: 0.9em;
        }

        /* 地震速報（緊急）のスタイル */
        #earthquake-alert {
            display: none;
            background-color: #e74c3c;
            color: white;
            border: 2px solid #c0392b;
            animation: blink 2s infinite;
        }
        #earthquake-alert h2 {
            border-bottom: 2px solid #c0392b;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.85; }
            100% { opacity: 1; }
        }
        ul.delay-list {
            margin: 0;
            padding-left: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>防災・運行情報センター</h1>
    </header>

    <div class="container">
        <div class="search-box">
            <select id="regionSelect"></select>
            <button onclick="fetchDisasterInfo()">情報を取得</button>
        </div>

        <div id="earthquake-alert" class="card">
            <h2>⚠️ 関連する地震情報</h2>
            <div id="earthquake-text"></div>
        </div>

        <div class="card" id="weather-info">
            <h2>☀️ 天気情報 (<span class="region-label"></span>)</h2>
            <div id="weather-text" class="loading">検索ボタンを押してください...</div>
        </div>

        <div class="card" id="typhoon-info">
            <h2>🌀 台風情報 (全国)</h2>
            <div id="typhoon-text" class="loading">待機中...</div>
        </div>

        <div class="card" id="delay-info">
            <h2>🚃 鉄道遅延情報 (全国)</h2>
            <p style="font-size: 0.8em; color: #666;">※路線ごとの都道府県判定が難しいため、現在遅延している全国の路線を表示します。</p>
            <div id="delay-text" class="loading">待機中...</div>
        </div>
    </div>

        prefectures.forEach((pref, index) => {

            option.value = index;
            option.textContent = pref.name;

            select.appendChild(option);
        });

        // WMO天気コードの変換
        function getWeatherDescription(code) {
            if (code <= 3) return "☀️ 晴れ・曇り";
            if (code <= 48) return "🌫️ 霧";
            if (code <= 67) return "☔ 雨";
            if (code <= 77) return "⛄ 雪";
            return "⛈️ 荒天";
        }

        async function fetchDisasterInfo() {
            const selectedIndex = select.value;

            // 各要素をローディング状態に
            document.getElementById('weather-text').innerHTML = '<span class="loading">取得中...</span>';
            document.getElementById('typhoon-text').innerHTML = '<span class="loading">取得中...</span>';
            document.getElementById('delay-text').innerHTML = '<span class="loading">取得中...</span>';
            document.getElementById('earthquake-alert').style.display = 'none';

            try {
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${region.lat}&longitude=${region.lon}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo`);

                const todayCode = weatherData.daily.weathercode[0];
                const maxTemp = weatherData.daily.temperature_2m_max[0];
                const minTemp = weatherData.daily.temperature_2m_min[0];

                    <p><strong>今日の天気:</strong> ${getWeatherDescription(todayCode)}</p>
                    <p><strong>最高気温:</strong> ${maxTemp}℃ / <strong>最低気温:</strong> ${minTemp}℃</p>
                `;

                console.error(error);
                document.getElementById('weather-text').textContent = "天気の取得に失敗しました。";
